services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: event-sphere-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - event-sphere-net

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-sphere-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/event-sphere
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5001:5001"
    depends_on:
      - mongo
    networks:
      - event-sphere-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_USE_LOCAL_STORAGE: ${VITE_USE_LOCAL_STORAGE:-false}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
    container_name: event-sphere-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - event-sphere-net

volumes:
  mongo_data:
  uploads_data:

networks:
  event-sphere-net:
    driver: bridge
